<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kuis Bahasa Jepang JLPT N3 Super Hard</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: "Trebuchet MS", Arial, sans-serif;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 196, 211, 0.45) 0 8%, transparent 9%),
        radial-gradient(circle at 88% 12%, rgba(255, 222, 230, 0.55) 0 9%, transparent 10%),
        linear-gradient(135deg, #fff7f7, #f8f1e9);
      color: #2b2b2b;
    }
    .sakura-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background-image: repeating-linear-gradient(45deg, transparent 0, transparent 22px, rgba(180, 32, 42, 0.12) 23px, rgba(180, 32, 42, 0.12) 24px);
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 940px;
      margin: 30px auto;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 12px 35px rgba(99, 38, 38, 0.18);
      border: 2px solid #f1c7c7;
    }
    .header {
      padding: 35px 25px;
      text-align: center;
      background:
        linear-gradient(rgba(152, 23, 35, 0.91), rgba(152, 23, 35, 0.91)),
        repeating-radial-gradient(circle at center, transparent 0 13px, rgba(255,255,255,0.2) 14px 15px);
      color: white;
    }
    .sun {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: #fff;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #b91c1c;
      font-size: 39px;
      box-shadow: 0 0 0 8px rgba(255,255,255,0.18);
    }
    h1 { margin: 0; font-size: 31px; letter-spacing: 1px; }
    .jp-title { font-size: 20px; margin-top: 8px; letter-spacing: 3px; }
    .subtitle { margin-top: 10px; font-size: 15px; opacity: 0.95; }
    .quiz-area { padding: 28px; }
    .tag {
      display: inline-block;
      padding: 7px 13px;
      background: #fff0f0;
      color: #9f1239;
      border: 1px solid #fecdd3;
      border-radius: 999px;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 15px;
    }
    .progress { font-size: 15px; color: #7f1d1d; margin-bottom: 10px; font-weight: bold; }
    .question-card {
      background: #fffaf6;
      border: 1px solid #f3d2c1;
      border-left: 6px solid #b91c1c;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
    }
    .question { font-size: 22px; font-weight: bold; line-height: 1.7; margin: 0; white-space: pre-line; }
    .option {
      display: block;
      width: 100%;
      padding: 14px 16px;
      margin: 11px 0;
      border: 2px solid #ead7d7;
      border-radius: 14px;
      background: #ffffff;
      font-size: 17px;
      cursor: pointer;
      text-align: left;
      transition: 0.2s;
      line-height: 1.5;
    }
    .option:hover:not(:disabled) { background: #fff1f2; border-color: #fb7185; transform: translateY(-1px); }
    .option:disabled { cursor: not-allowed; opacity: 0.92; }
    .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
    .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
    #feedback {
      margin-top: 18px;
      padding: 15px;
      border-radius: 14px;
      background: #fef2f2;
      color: #7f1d1d;
      font-size: 16px;
      line-height: 1.6;
      font-weight: bold;
      min-height: 20px;
    }
    #score { margin-top: 15px; font-size: 17px; color: #444; font-weight: bold; }
    #nextBtn, #restartBtn {
      margin-top: 20px;
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #b91c1c, #e11d48);
      color: white;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 15px rgba(185, 28, 28, 0.25);
    }
    #nextBtn:hover, #restartBtn:hover { background: linear-gradient(135deg, #991b1b, #be123c); }
    .result-box { text-align: center; padding: 20px; }
    .result-score { font-size: 54px; color: #b91c1c; margin: 10px 0; }
    .review {
      text-align: left;
      margin-top: 25px;
      background: #fffaf6;
      border: 1px solid #f3d2c1;
      border-radius: 16px;
      padding: 15px;
      line-height: 1.6;
    }
    .review h3 { color: #7f1d1d; margin-top: 0; }
    .review-item { border-bottom: 1px solid #f3d2c1; padding: 12px 0; }
    .review-item:last-child { border-bottom: none; }
    .footer {
      text-align: center;
      padding: 18px;
      background: #fff7f7;
      color: #7f1d1d;
      font-size: 14px;
      border-top: 1px solid #f3d2d2;
    }
    .decor { font-size: 24px; margin: 10px 0; }
    @media (max-width: 600px) {
      body { padding: 10px; }
      h1 { font-size: 24px; }
      .question { font-size: 19px; }
      .quiz-area { padding: 20px; }
      .option { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="sakura-bg"></div>

      <p id="feedback"></p>

      <button id="nextBtn" onclick="nextQuestion()">Soal Berikutnya ➜</button>
    </div>
    <div class="footer">🌸 Ganbatte! 頑張ってください 🌸</div>
  </div>

      document.getElementById("feedback").innerHTML = "";
      document.getElementById("score").innerHTML = "Skor sementara: " + score + " / " + quiz.length;
      q.options.forEach(function(option, index) {
        const btn = document.createElement("button");
        btn.className = "option";
        btn.innerText = String.fromCharCode(65 + index) + ". " + option;
        btn.dataset.option = option;
        btn.onclick = function() { checkAnswer(btn, option); };
        optionsDiv.appendChild(btn);
      });
    }
    function checkAnswer(button, selected) {
      if (answered) return;
      answered = true;
      const q = quiz[currentQuestion];
      const allButtons = document.querySelectorAll(".option");
      allButtons.forEach(function(btn) {
        btn.disabled = true;
        if (btn.dataset.option === q.answer) btn.classList.add("correct");
      });
      if (selected === q.answer) {
        score++;
        button.classList.add("correct");
        document.getElementById("feedback").innerHTML = "正解！ Benar!<br>" + q.explanation;
      } else {
        button.classList.add("wrong");
        wrongAnswers.push({ question: q.question, selected: selected, answer: q.answer, explanation: q.explanation });
        document.getElementById("feedback").innerHTML = "不正解。Salah. Jawaban yang benar adalah: <strong>" + q.answer + "</strong><br>" + q.explanation;
      }
      document.getElementById("score").innerHTML = "Skor sementara: " + score + " / " + quiz.length;
    }
    function nextQuestion() {
      if (!answered) {
        alert("Pilih jawaban dulu sebelum lanjut.");
        return;
      }
      currentQuestion++;
      if (currentQuestion < quiz.length) showQuestion();
      else showResult();
    }
    function showResult() {
      const percentage = (score / quiz.length) * 100;
      let message = "";
      if (percentage >= 90) message = "すごい！ Sangat kuat. Kamu siap menghadapi soal N3 yang menuntut logika grammar.";
      else if (percentage >= 75) message = "いいですね！ Bagus. Pemahamanmu kuat, tetapi masih perlu mengasah perbedaan pola yang mirip.";
      else if (percentage >= 60) message = "もう少し！ Cukup baik. Fokus ulang pada grammar N3 seperti ものの, にしたがって, だけあって, わけにはいかない, dan ばかりに.";
      else message = "頑張って！ Masih perlu penguatan dari N4 menuju N3, terutama pola kalimat dan kosakata konteks.";
      let reviewHtml = "";
      if (wrongAnswers.length > 0) {
        reviewHtml = `<div class="review"><h3>Review Jawaban Salah</h3>${wrongAnswers.map((item, index) => `<div class="review-item"><strong>${index + 1}. ${item.question}</strong><br>Jawaban kamu: ${item.selected}<br>Jawaban benar: <strong>${item.answer}</strong><br>${item.explanation}</div>`).join("")}</div>`;
      } else {
        reviewHtml = `<div class="review"><h3>完璧！ Semua jawaban benar.</h3><p>Kamu berhasil menjawab semua soal tanpa kesalahan.</p></div>`;
      }
      document.getElementById("quizBox").innerHTML = `<div class="result-box"><div class="decor">🌸 ⛩️ 🌸</div><h2>Hasil Akhir</h2><p>Skor kamu:</p><div class="result-score">${score} / ${quiz.length}</div><p>${message}</p><button id="restartBtn" onclick="location.reload()">Ulangi Kuis</button>${reviewHtml}</div>`;
    }
    startQuiz();
  </script>
</body>
</html>
